brand:
  name: "Dr. Deepika Singh"
  tagline: "MD AIIMS | 15+ Yrs Exp | FCLS | MCCOG"
  phone: "+91 85959 54095"
  clinic: "F-11, South Extension Part 1, New Delhi"
  primary_color: "#1B3A5C"
  accent_color: "#E8734A"
  bg_color: "#FFFFFF"
  text_color: "#1B3A5C"
  card_bg_color: "#0D1B2A"
  card_accent_color: "#E8734A"
  card_text_color: "#FFFFFF"
  card_subtext_color: "#94A3B8"
  highlight_color: "#F59E0B"

fonts:
  subtitle: "Poppins-Medium.ttf"
  text_card: "Poppins-Bold.ttf"
  lower_third: "Poppins-SemiBold.ttf"
  subtitle_size: 42
  text_card_size: 56
  lower_third_size: 36

subtitle_style:
  bg_color: "rgba(0,0,0,0.7)"
  text_color: "#FFFFFF"
  highlight_color: "#E8734A"
  y_position_ratio: 0.84

info_card:
  enabled: true
  interval_seconds: 90
  show_duration: 8
  position: "top-left"
  width: 520
  padding: 28
  corner_radius: 16
  bg_color: "#0A1628"
  accent_color: "#E8734A"
  text_color: "#FFFFFF"
  subtext_color: "#D1D5DB"
  border_color: "#E8734A"
  border_width: 2
  accent_bar_width: 8
  name_font_size: 42
  title_font_size: 26
  line_font_size: 24
  phone_font_size: 28
  lines:
    - "Dr. Deepika Singh"
    - "MD AIIMS | FCLS | MCCOG"
    - "Sr. Gynecologist & Laparoscopic Surgeon"
    - "15+ Yrs Experience | 20,000+ Patients"
    - "+91 85959 54095"
    - "South Extension-1, New Delhi"

text_card_style:
  bg_color: "#0A1628"
  accent_bar_color: "#E8734A"
  text_color: "#FFFFFF"
  subtext_color: "#CBD5E1"
  corner_radius: 18
  padding_x: 64
  padding_y: 36
  border_width: 2
  border_color: "#E8734A"
  animation: "slide_up"        # "slide_up", "scale_bounce", "fade_scale", "none"
  animation_duration: 0.35     # seconds for entrance/exit animation

lower_third_style:
  bg_color: "#0A1628"
  accent_bar_color: "#E8734A"
  text_color: "#FFFFFF"
  subtext_color: "#CBD5E1"
  height: 100
  corner_radius: 10
  accent_bar_width: 7

smart_zoom:
  enabled: true
  max_zoom: 1.04              # subtle 4% centered zoom (1.0 = disabled)
  cycle_seconds: 18           # seconds per zoom-in or zoom-out phase

watermark:
  logo: "assets/templates/brand_logo.png"
  opacity: 0.1
  position: "bottom-right"
  margin: 20

broll_fx:
  ken_burns: true
  zoom_start: 1.0
  zoom_end: 1.15
  zoom_duration: "full"

image_generation:
  style: "realistic editorial photo"
  positive_suffix: "realistic editorial photo, natural clinic lighting, medium shot, simple clean background, hands relaxed or out of frame, no text, no words, no letters"
  negative_prompt: "extra fingers, missing fingers, fused fingers, deformed hands, bad hands, extra hands, multiple hands, extra arms, extra limbs, distorted limbs, twisted fingers, two fingers, three fingers, long fingers, broken fingers, close up hands, close up fingers, text, words, letters, watermark, logo, signature, blurry, low quality, deformed face, distorted face"
  safe_scene_fallback: "an Indian woman patient sitting in a clean clinic while a female doctor talks to her, calm realistic editorial photo, natural clinic lighting, medium shot, hands relaxed or out of frame, no text, no words, no letters"
  avoid_hand_actions: true

music:
  default_track: "assets/music/background.mp3"
  volume_under_speech: -30
  volume_normal: -20
  fade_out_seconds: 3

export:
  youtube_lufs: -14
  default_resolution: "1920x1080"
  draft_resolution: "854x480"
  codec: "libx264"
  preset: "medium"
  crf: 23
